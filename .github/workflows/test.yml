name: Unit tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'common/**'
  pull_request:
    branches: [main]
    paths:
      - 'common/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: 'yarn.lock'
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            common/node_modules
            web/node_modules
            backend/api/node_modules
            backend/discord-bot/node_modules
            backend/scheduler/node_modules
            backend/scripts/node_modules
            backend/shared/node_modules
            client-common/node_modules
          key: ${{ runner.os }}-node20-yarn1-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node20-yarn1-modules-
      - name: Install dependencies
        run: mkdir -p "$(yarn cache dir)" && yarn install --prefer-offline --frozen-lockfile --check-files
      - name: Run lint
        run: yarn lint
      - name: Run unit tests
        working-directory: common
        run: yarn test
